# https://www.haproxy.com/documentation/hapee/latest/onepage/#home
# HAProxy configuration for PROXY protocol testing with TCP-level dropping
# This config accepts PROXY protocol connections from upstream (nginx stream)
# The real client IP is received via PROXY protocol header, not HTTP headers
# Banned IPs are dropped at the TCP level before HTTP processing

global
    log stdout format raw local0
    tune.bufsize 65536  # 64KB - increased for WAF body inspection
    stats socket /tmp/haproxy.sock mode 660 level admin
    stats timeout 30s

defaults
    log global
    timeout client 1m
    timeout server 1m
    timeout connect 10s
    timeout queue 15s
    timeout tunnel 4h  # for websocket

frontend test
    mode tcp
    # accept-proxy enables PROXY protocol parsing on this bind
    # The client IP will be automatically set from PROXY protocol header
    bind *:9090 accept-proxy

    # Enable SPOE filter for CrowdSec integration
    # The crowdsec-tcp message fires on-client-session with the real IP from PROXY protocol
    filter spoe engine crowdsec config /etc/haproxy/crowdsec.cfg

    # TCP-level inspection to check SPOE decision
    tcp-request inspect-delay 5s

    # Drop banned IPs at TCP level - connection is immediately terminated
    tcp-request content reject if { var(txn.crowdsec.remediation) -m str "ban" }

    use_backend test_backend

backend test_backend
    mode tcp
    server s1 whoami:2020

backend crowdsec-spoa
    mode tcp
    timeout connect 2s
    timeout server 60s
    server s2 spoa:9000
