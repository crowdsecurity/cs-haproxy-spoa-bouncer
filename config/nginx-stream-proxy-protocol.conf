# Nginx stream module configuration for PROXY protocol testing
# This uses Layer 4 (TCP) proxying with PROXY protocol v1/v2
# to send the real client IP to HAProxy

events {
    worker_connections 1024;
}

stream {
    # Enable logging
    log_format proxy '$remote_addr [$time_local] '
                     '$protocol $status $bytes_sent $bytes_received '
                     '$session_time "$upstream_addr"';

    access_log /var/log/nginx/stream-access.log proxy;
    error_log /var/log/nginx/stream-error.log;

    upstream haproxy_backend {
        server haproxy:9090;
    }

    server {
        listen 80;

        # Enable PROXY protocol v1 (text-based, widely compatible)
        # This sends the real client IP to HAProxy
        proxy_protocol on;

        # Proxy to HAProxy
        proxy_pass haproxy_backend;

        # Connection settings
        proxy_connect_timeout 5s;
        proxy_timeout 10s;

        # Close client connection when upstream closes (important for HAProxy reject)
        proxy_half_close on;
    }
}
